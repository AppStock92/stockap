<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — StockApp</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --mono: 'IBM Plex Mono', monospace; --brand-dark: #1A1A18; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .brand { font-family: var(--mono); font-size: 15px; letter-spacing: .05em; }
    .brand span { opacity: .4; }
    .card { border-radius: 14px; border: 1px solid #DDDBD4; max-width: 380px; width: 100%; }
    .form-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .form-control { background: var(--bg); border-color: var(--border); border-radius: 8px; font-size: 15px; }
    .form-control:focus { background: #fff; border-color: var(--brand-dark); box-shadow: none; }
    .btn-brand { background: var(--brand-dark); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; padding: 10px; }
    .btn-brand:hover { opacity: .85; color: #fff; }
    .hint { font-family: var(--mono); font-size: 12px; color: var(--muted); background: var(--bg); border: 1px solid #DDDBD4; border-radius: 6px; padding: 8px 12px; text-align: center; }
  </style>
</head>
<body>
<div class="container px-3">
  <div class="text-center mb-4">
    <div class="brand">📦 <span>stock</span>app</div>
  </div>
  <div class="card mx-auto p-4">
    <h5 class="fw-semibold mb-1">Connexion</h5>
    <p class="text-muted mb-4" style="font-size:13px">Accédez à votre espace de gestion</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} py-2 mb-3" style="font-size:13px;border-radius:8px">
          <i class="bi bi-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }} me-1"></i>{{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Identifiant</label>
        <input type="text" name="username" class="form-control" placeholder="admin" autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" name="remember" id="remember">
        <label class="form-check-label text-muted" for="remember" style="font-size:13px">Se souvenir de moi</label>
      </div>
      <a href="/mot-de-passe-oublie" style="display:block;text-align:right;font-size:12px;color:var(--muted);text-decoration:none;margin-bottom:12px">Mot de passe oublié ?</a>
      <button type="submit" class="btn btn-brand w-100"><i class="bi bi-box-arrow-in-right me-2"></i>Se connecter</button>
    </form>
    <div class="divider" style="display:flex;align-items:center;gap:12px;margin:1.25rem 0;color:var(--muted);font-size:13px">
  <span style="flex:1;border-top:1px solid var(--border)"></span>pas encore de compte ?<span style="flex:1;border-top:1px solid var(--border)"></span>
</div>
<a href="/register" style="display:block;text-align:center;font-size:14px;font-weight:500;padding:10px;border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none">
  Créer un espace gratuit →
</a>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script>
  const saved = localStorage.getItem('theme');
  const prefDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme', saved || (prefDark ? 'dark' : 'light'));
</script>
</body>
</html>
