<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erreur {{ code }} — StockApp</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    [data-theme="light"]{--bg:#F5F4F0;--surface:#fff;--border:#DDDBD4;--text:#1A1A18;--muted:#7A7870}
    [data-theme="dark"] {--bg:#141413;--surface:#1E1D1B;--border:#2E2D2A;--text:#E8E6E0;--muted:#888780}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .wrap{text-align:center;max-width:480px}
    .code{font-family:'IBM Plex Mono',monospace;font-size:80px;font-weight:500;
          line-height:1;color:var(--muted);margin-bottom:1rem;opacity:.3}
    h1{font-size:22px;font-weight:600;margin-bottom:.5rem}
    p{font-size:15px;color:var(--muted);margin-bottom:2rem;line-height:1.6}
    .btn{display:inline-block;padding:10px 24px;background:var(--text);color:var(--bg);
         border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;
         transition:opacity .15s}
    .btn:hover{opacity:.85;color:var(--bg)}
    .btn-outline{background:none;border:1px solid var(--border);color:var(--text);margin-left:8px}
    .brand{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.05em;
           color:var(--muted);margin-bottom:2.5rem}
    .brand span{opacity:.4}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">📦 <span>stock</span>app</div>
  <div class="code">{{ code }}</div>
  <h1>
    {% if code == 404 %}Page introuvable
    {% elif code == 403 %}Accès refusé
    {% elif code == 429 %}Trop de requêtes
    {% else %}Erreur serveur{% endif %}
  </h1>
  <p>{{ message }}</p>
  <a href="/" class="btn">← Retour à l'accueil</a>
  {% if code == 500 %}
  <a href="mailto:support@stockapp.fr" class="btn btn-outline">Contacter le support</a>
  {% endif %}
</div>
<script>
  const s = localStorage.getItem('theme');
  document.documentElement.setAttribute('data-theme',
    s || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));
</script>
</body>
</html>
