<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — StockApp</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <style>
    [data-theme="light"]{--bg:#F5F4F0;--surface:#fff;--border:#DDDBD4;--text:#1A1A18;--muted:#7A7870;--ok:#1E7E4A;--err-bg:#FEF0EE;--err:#C0392B}
    [data-theme="dark"] {--bg:#141413;--surface:#1E1D1B;--border:#2E2D2A;--text:#E8E6E0;--muted:#888780;--ok:#5DCAA5;--err-bg:#2E0D0D;--err:#F09595}
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;transition:background .2s}
    .brand{font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:.05em;text-align:center;margin-bottom:1.5rem}
    .brand span{opacity:.4}
    .wrap{width:100%;max-width:420px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem}
    h5{font-size:18px;font-weight:600;margin-bottom:.25rem}
    .sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
    .form-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
    .form-group{margin-bottom:1rem;position:relative}
    input[type=password]{width:100%;padding:10px 40px 10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:15px;color:var(--text);font-family:inherit;transition:border-color .15s;box-sizing:border-box}
    input:focus{outline:none;border-color:var(--text);background:var(--surface)}
    input.valid{border-color:var(--ok)}
    input.invalid{border-color:var(--err)}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;line-height:1}
    .strength-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-top:6px}
    .strength-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s}
    .field-msg{font-size:12px;margin-top:4px;min-height:16px}
    .field-msg.ok{color:var(--ok)}
    .field-msg.err{color:var(--err)}
    .btn-submit{width:100%;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:.5rem;transition:opacity .15s}
    .btn-submit:hover{opacity:.85}
    .btn-submit:disabled{opacity:.4;cursor:not-allowed}
    .alert-err{background:var(--err-bg);border-left:3px solid var(--err);padding:10px 14px;font-size:13px;color:var(--err);margin-bottom:1rem;border-radius:0 6px 6px 0}
    .rules{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.6}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">📦 <span>stock</span>app</div>

  <div class="card">
    <h5>Nouveau mot de passe</h5>
    <p class="sub">Choisissez un mot de passe sécurisé pour votre compte.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert-err">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" id="resetForm" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <!-- Mot de passe -->
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <input type="password" name="password" id="password"
               placeholder="6 caractères minimum" required
               autofocus autocomplete="new-password"
               oninput="checkPwd(this)">
        <button type="button" class="eye-btn" onclick="toggleEye('password', this)">👁</button>
        <div class="strength-bar"><div class="strength-fill" id="fill"></div></div>
        <div class="field-msg" id="msg-pwd"></div>
        <div class="rules">
          Conseils : mélanger majuscules, chiffres et symboles.
        </div>
      </div>

      <!-- Confirmation -->
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input type="password" name="confirm" id="confirm"
               placeholder="Répéter le mot de passe" required
               autocomplete="new-password"
               oninput="checkConfirm(this)">
        <button type="button" class="eye-btn" onclick="toggleEye('confirm', this)">👁</button>
        <div class="field-msg" id="msg-confirm"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn" disabled>
        Enregistrer le nouveau mot de passe →
      </button>
    </form>
  </div>
</div>

<script>
  const s = localStorage.getItem('theme');
  document.documentElement.setAttribute('data-theme',
    s || (matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));

  function toggleEye(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  }

  function checkPwd(input) {
    const v = input.value;
    const fill = document.getElementById('fill');
    const msg  = document.getElementById('msg-pwd');
    let score = 0;
    if (v.length >= 6)           score++;
    if (v.length >= 10)          score++;
    if (/[A-Z]/.test(v))        score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^a-zA-Z0-9]/.test(v)) score++;
    const levels = [
      {pct:'0',   bg:'transparent', label:''},
      {pct:'25%', bg:'#E24B4A',     label:'Trop faible'},
      {pct:'50%', bg:'#EF9F27',     label:'Faible'},
      {pct:'75%', bg:'#378ADD',     label:'Bon'},
      {pct:'90%', bg:'#1D9E75',     label:'Très bon'},
      {pct:'100%',bg:'#1D9E75',     label:'Excellent ✓'},
    ];
    const l = levels[Math.min(score, 5)];
    fill.style.width = l.pct; fill.style.background = l.bg;
    msg.textContent  = v.length === 0 ? '' : l.label;
    msg.className    = 'field-msg ' + (score >= 2 ? 'ok' : 'err');
    input.classList.toggle('valid',   score >= 2 && v.length >= 6);
    input.classList.toggle('invalid', v.length > 0 && v.length < 6);
    const conf = document.getElementById('confirm');
    if (conf.value) checkConfirm(conf);
    updateBtn();
  }

  function checkConfirm(input) {
    const pwd = document.getElementById('password').value;
    const ok  = input.value === pwd && input.value.length > 0;
    const msg = document.getElementById('msg-confirm');
    input.classList.toggle('valid',   ok);
    input.classList.toggle('invalid', !ok && input.value.length > 0);
    msg.textContent = input.value.length === 0 ? '' :
                      (ok ? 'Correspondance ✓' : 'Ne correspond pas');
    msg.className   = 'field-msg ' + (ok ? 'ok' : 'err');
    updateBtn();
  }

  function updateBtn() {
    const pwd  = document.getElementById('password');
    const conf = document.getElementById('confirm');
    document.getElementById('submitBtn').disabled =
      !(pwd.classList.contains('valid') && conf.classList.contains('valid'));
  }
</script>
</body>
</html>
