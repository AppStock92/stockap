{% extends "base.html" %}
{% block title %}Modifier — StockApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-5">
    <a href="{{ url_for('index') }}"
       class="text-muted text-decoration-none d-inline-flex align-items-center gap-1 mb-3"
       style="font-size:13px">
      <i class="bi bi-arrow-left"></i> Retour aux produits
    </a>
    <div class="card p-4">
      <h5 class="fw-semibold mb-1">Modifier le produit</h5>
      <div class="mb-4" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:#7A7870">
        ID #{{ produit['id'] }}
      </div>
      <form method="POST" action="{{ url_for('update', id=produit['id']) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Nom du produit</label>
          <input type="text" name="nom" class="form-control" value="{{ produit['nom'] }}" required>
        </div>
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label">Quantité</label>
            <input type="number" name="quantite" class="form-control"
                   value="{{ produit['quantite'] }}" min="0" required>
          </div>
          <div class="col-6">
            <label class="form-label">Seuil d'alerte</label>
            <input type="number" name="seuil" class="form-control"
                   value="{{ produit['seuil'] }}" min="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Prix unitaire (€)</label>
          <input type="number" name="prix" class="form-control" step="0.01"
                 value="{{ produit['prix'] }}" min="0" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Catégorie</label>
          <select name="categorie_id" class="form-select">
            <option value="">— Aucune catégorie —</option>
            {% for cat in categories %}
              <option value="{{ cat['id'] }}"
                {% if produit['categorie_id'] == cat['id'] %}selected{% endif %}>
                {{ cat['nom'] }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-4">
          <label class="form-label">Fournisseur</label>
          <select name="fournisseur_id" class="form-select">
            <option value="">— Aucun fournisseur —</option>
            {% for f in fournisseurs %}
              <option value="{{ f['id'] }}"
                {% if produit['fournisseur_id'] == f['id'] %}selected{% endif %}>
                {{ f['nom'] }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="d-flex gap-2">
          <a href="{{ url_for('index') }}" class="btn btn-outline-secondary flex-grow-1">Annuler</a>
          <button type="submit" class="btn btn-brand flex-grow-1">
            <i class="bi bi-check-lg me-1"></i>Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
